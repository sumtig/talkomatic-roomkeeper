<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KeepBot — Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --panel:    #161b27;
    --card:     #1c2333;
    --border:   #2a3349;
    --teal:     #2bb5a0;
    --teal-dim: #1a7a6e;
    --yellow:   #e5c07b;
    --green:    #98c379;
    --red:      #e06c75;
    --muted:    #5c6882;
    --text:     #c9d1e0;
    --text-dim: #8892a4;
    --header-bg:#0d2137;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--header-bg);
    border-bottom: 1px solid var(--teal-dim);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; color: var(--teal); letter-spacing: 2px; font-weight: 700; }
  .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: var(--teal-dim); color: #fff; font-weight: 600;
  }
  .badge.red   { background: #5c1f24; color: var(--red); }
  .badge.green { background: #1e3a2a; color: var(--green); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); margin-left: auto; flex-shrink: 0;
    box-shadow: 0 0 6px var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
  #header-room   { color: var(--text-dim); font-size: 13px; }
  #header-uptime { color: var(--teal);     font-size: 13px; font-variant-numeric: tabular-nums; margin-left: auto; }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: 1fr 220px;
    gap: 1px;
    flex: 1;
    overflow: hidden;
    background: var(--border);
  }

  .pane {
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .pane-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    color: var(--muted); text-transform: uppercase;
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .pane-body { flex: 1; overflow-y: auto; padding: 10px 14px; }
  .pane-body::-webkit-scrollbar { width: 4px; }
  .pane-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── User cards ── */
  .user-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .user-card.muted { opacity: 0.5; }
  .user-card.bot   { border-color: var(--teal-dim); }
  .user-header {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: #1a2035;
    border-bottom: 1px solid var(--border);
  }
  .user-icon { font-size: 13px; }
  .user-name { font-weight: 600; font-size: 13px; color: var(--text); }
  .user-loc  { font-size: 11px; color: var(--muted); margin-left: auto; }
  .user-body {
    padding: 8px 12px;
    min-height: 36px;
    font-size: 13px;
    color: var(--text-dim);
    word-break: break-word;
    line-height: 1.5;
  }
  .user-body.empty { color: var(--muted); font-style: italic; }
  .user-footer {
    padding: 4px 12px 8px;
    display: flex; gap: 6px;
  }

  /* ── Control pane ── */
  .ctrl-group { margin-bottom: 16px; }
  .ctrl-group label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 6px;
  }

  input[type=text], textarea {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    padding: 7px 10px;
    outline: none;
    resize: vertical;
    transition: border-color 0.2s;
  }
  input[type=text]:focus, textarea:focus { border-color: var(--teal); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 6px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.97); }
  .btn-teal   { background: var(--teal);     color: #000; }
  .btn-yellow { background: var(--yellow);   color: #000; }
  .btn-red    { background: #3d1a1e;         color: var(--red);   border: 1px solid #5c2830; }
  .btn-muted  { background: var(--border);   color: var(--text-dim); }
  .btn-sm     { padding: 3px 10px; font-size: 11px; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-row    { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }

  /* pin banner */
  #pin-banner {
    display: none;
    background: #2a2010;
    border: 1px solid #5c4a1a;
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--yellow);
  }
  #pin-banner span { font-weight: 700; }

  /* ── Log pane ── */
  #log-body {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  #log-body .log-entry { padding: 1px 0; }
  #log-body .log-entry:last-child { color: var(--text); }

  /* Spans the full bottom */
  .pane-log { grid-column: 1 / -1; }

  /* ── Stat bar ── */
  .stat-bar {
    display: flex; gap: 20px;
    padding: 6px 14px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
    flex-shrink: 0;
  }
  .stat-bar span { color: var(--text-dim); }
  .stat-bar b    { color: var(--teal); }
</style>
</head>
<body>

<header>
  <h1>⬡ KEEPBOT</h1>
  <div class="badge" id="header-badge">—</div>
  <div id="header-room">not connected</div>
  <div id="header-uptime">00:00:00</div>
  <div class="status-dot" id="status-dot"></div>
</header>

<div class="layout">

  <!-- Users -->
  <div class="pane">
    <div class="pane-title">Live Chat</div>
    <div class="pane-body" id="users-pane">
      <div style="color:var(--muted);font-style:italic">Waiting for room…</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="pane">
    <div class="pane-title">Controls</div>
    <div class="pane-body">

      <div id="pin-banner">📌 Pinned: <span id="pin-text"></span></div>

      <div class="ctrl-group">
        <label>Send as bot</label>
        <input type="text" id="msg-input" placeholder="Type a message…">
        <div class="btn-row">
          <button class="btn btn-teal"   onclick="sendMsg()">📤 Send & Pin</button>
          <button class="btn btn-muted"  onclick="unpin()"  id="unpin-btn" disabled>▶ Resume auto</button>
        </div>
      </div>

      <div class="ctrl-group">
        <label>main.txt template</label>
        <textarea id="template-area" rows="4" placeholder="{uptime}"></textarea>
        <div class="btn-row">
          <button class="btn btn-yellow btn-sm" onclick="saveTemplate()">💾 Save & Apply</button>
        </div>
      </div>

      <div class="ctrl-group" id="rate-info">
        <label>Update rate</label>
        <div style="color:var(--text-dim);font-size:12px" id="rate-display">—</div>
      </div>

    </div>
  </div>

  <!-- Logs -->
  <div class="pane pane-log">
    <div class="pane-title">Log</div>
    <div class="pane-body" id="log-body"></div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const sock = io("http://localhost:3100");
let state  = null;

sock.on("connect", () => {
  document.getElementById("status-dot").classList.add("connected");
  // Request latest state in case we reconnected or refreshed
  sock.emit("cmd", { type: "reload_template" });
});
sock.on("disconnect", () => { document.getElementById("status-dot").classList.remove("connected"); });

sock.on("state", (s) => {
  state = s;
  render(s);
});

sock.on("logs", ({ entries }) => {
  entries.forEach(addLog);
});

sock.on("log", ({ entry }) => addLog(entry));

function addLog(entry) {
  const el   = document.getElementById("log-body");
  const div  = document.createElement("div");
  div.className = "log-entry";
  div.textContent = entry;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function render(s) {
  // Header
  document.getElementById("header-room").textContent = s.roomName
    ? `Room: ${s.roomName}  (#${s.roomId})`
    : s.roomId ? `Joining room ${s.roomId}…` : "Waiting for room selection…";
  document.getElementById("header-uptime").textContent = s.uptime;
  document.getElementById("header-badge").textContent  = `${s.userCount} user${s.userCount === 1 ? "" : "s"}`;

  // Rate
  document.getElementById("rate-display").textContent =
    `${s.rate}s per update  (${s.userCount <= 1 ? "alone" : "active"})`;

  // Pin banner
  const banner   = document.getElementById("pin-banner");
  const unpinBtn = document.getElementById("unpin-btn");
  if (s.manualMsg !== null) {
    banner.style.display = "block";
    document.getElementById("pin-text").textContent = s.manualMsg;
    unpinBtn.disabled = false;
  } else {
    banner.style.display = "none";
    unpinBtn.disabled = true;
  }

  // Template
  const ta = document.getElementById("template-area");
  if (document.activeElement !== ta)
    ta.value = s.template || "";

  // Users
  const pane = document.getElementById("users-pane");
  const muted = new Set(s.mutedIds);

  // Build keyed map of existing cards
  const existing = {};
  pane.querySelectorAll(".user-card[data-id]").forEach(el => existing[el.dataset.id] = el);

  const rendered = new Set();
  s.users.forEach(u => {
    rendered.add(u.id);
    const isBot   = u.id === s.myUserId;
    const isMuted = muted.has(u.id);

    let card = existing[u.id];
    if (!card) {
      card = document.createElement("div");
      card.className = "user-card";
      card.dataset.id = u.id;
      card.innerHTML = `
        <div class="user-header">
          <span class="user-icon"></span>
          <span class="user-name"></span>
          <span class="user-loc"></span>
        </div>
        <div class="user-body"></div>
        <div class="user-footer"></div>`;
      pane.appendChild(card);
    }

    card.className = "user-card" + (isBot ? " bot" : "") + (isMuted ? " muted" : "");
    card.querySelector(".user-icon").textContent = isBot ? "▶" : "◈";
    card.querySelector(".user-name").textContent = u.username + (isBot ? " [bot]" : "");
    card.querySelector(".user-loc").textContent  = u.location || "";

    const body = card.querySelector(".user-body");
    if (isMuted) {
      body.textContent = "";
      body.className   = "user-body empty";
    } else {
      body.textContent = u.text || "";
      body.className   = "user-body" + (!u.text ? " empty" : "");
      if (!u.text) body.textContent = "(no message yet)";
    }

    // Footer buttons
    const footer = card.querySelector(".user-footer");
    if (!isBot) {
      footer.innerHTML = isMuted
        ? `<button class="btn btn-muted btn-sm" onclick="unmute('${u.id}')">🔊 Unmute</button>`
        : `<button class="btn btn-red   btn-sm" onclick="mute('${u.id}')">🔇 Mute</button>`;
    } else {
      footer.innerHTML = "";
    }
  });

  // Remove cards for users who left
  Object.keys(existing).forEach(id => {
    if (!rendered.has(id)) existing[id].remove();
  });

  // Empty state
  if (s.users.length === 0) {
    pane.innerHTML = `<div style="color:var(--muted);font-style:italic">No users in room yet…</div>`;
  }
}

// ── Commands ──────────────────────────────────────────────────
function sendMsg() {
  const val = document.getElementById("msg-input").value.trim();
  if (!val) return;
  sock.emit("cmd", { type: "send", text: val });
  document.getElementById("msg-input").value = "";
}

function unpin() {
  sock.emit("cmd", { type: "unpin" });
}

function mute(userId) {
  sock.emit("cmd", { type: "mute", userId });
}

function unmute(userId) {
  sock.emit("cmd", { type: "unmute", userId });
}

function saveTemplate() {
  const val = document.getElementById("template-area").value;
  try {
    fetch("/save-template", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ template: val }),
    });
  } catch {}
  sock.emit("cmd", { type: "reload_template" });
}

// Enter to send
document.getElementById("msg-input").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMsg();
});

// Auto-scroll log
const logPane = document.getElementById("log-body");
const logObs  = new MutationObserver(() => logPane.scrollTop = logPane.scrollHeight);
logObs.observe(logPane, { childList: true });
</script>
</body>
</html>
